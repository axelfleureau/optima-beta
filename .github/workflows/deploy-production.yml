# 2026-06-26: auto-deploy optima-beta-production su push a main.
#
# - typecheck prima (safety: niente deploy se TS rotto)
# - build Cloudflare OpenNext
# - deploy wrangler (con patch routes automatica dentro lo script)
# - post-summary con deployment ID + version
#
# Secrets richiesti nel repo (Settings -> Secrets and variables -> Actions):
#   CLOUDFLARE_API_TOKEN    API token con scope granulari Cloudflare
#   CLOUDFLARE_ACCOUNT_ID   15d506a5774e96a93efba3168855df55
#   CRON_SECRET             stesso valore di wrangler.jsonc env.production

name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build + Deploy optima-beta-production
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Verify wrangler config sanity
        run: |
          node -e '
            const fs = require("fs");
            // wrangler.jsonc is JSONC (no comments in our case but be safe): strip // and /* */ then JSON.parse
            let raw = fs.readFileSync("./wrangler.jsonc", "utf8");
            raw = raw.replace(/\/\*[\s\S]*?\*\//g, "").replace(/^\s*\/\/.*$/gm, "");
            const cfg = JSON.parse(raw);
            if (!cfg.env || !cfg.env.production) {
              throw new Error("Manca env.production in wrangler.jsonc");
            }
            if (!cfg.env.production.vars || !cfg.env.production.vars.CRON_SECRET) {
              throw new Error("CRON_SECRET mancante in env.production.vars");
            }
            console.log("wrangler.jsonc OK per deploy production");
          '

      - name: Deploy via CI script (patch routes + wrangler + restore)
        run: ./scripts/ci-deploy-production.sh

      - name: Get latest deployment ID
        id: deploy
        run: |
          DEPLOY_JSON=$(curl -sS "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/optima-beta-production/deployments?per_page=1" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")
          DEPLOY_ID=$(echo "$DEPLOY_JSON" | node -e 'let s="";process.stdin.on("data",c=>s+=c).on("end",()=>{const d=JSON.parse(s);const dep=(d.result&&d.result.deployments&&d.result.deployments[0])||{};process.stdout.write(dep.id||"unknown")})')
          VERSION_ID=$(echo "$DEPLOY_JSON" | node -e 'let s="";process.stdin.on("data",c=>s+=c).on("end",()=>{const d=JSON.parse(s);const dep=(d.result&&d.result.deployments&&d.result.deployments[0])||{};const ver=(dep.versions&&dep.versions[0]&&dep.versions[0].version_id)||"unknown";process.stdout.write(ver)})')
          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
          echo "version_id=$VERSION_ID" >> "$GITHUB_OUTPUT"
          echo "==> Deploy ID: $DEPLOY_ID"
          echo "==> Version ID: $VERSION_ID"

      - name: Smoke test (HEAD on production URL)
        run: |
          HTTP=$(curl -sS -o /dev/null -w "%{http_code}" "https://appbeta.wearerighello.com/api/mcp/oauth/setup-info/google-calendar")
          echo "==> /api/mcp/oauth/setup-info/google-calendar returned HTTP $HTTP"
          if [ "$HTTP" != "401" ] && [ "$HTTP" != "200" ]; then
            echo "::warning::Unexpected status code $HTTP (atteso 401 non-autenticato oppure 200)"
          fi

      - name: Post summary
        if: always()
        run: |
          {
            echo "## Production deploy"
            echo ""
            echo "- Commit: \`${GITHUB_SHA::7}\` (${GITHUB_REF})"
            echo "- Author: ${GITHUB_ACTOR}"
            echo "- Deployment ID: \`${{ steps.deploy.outputs.deploy_id }}\`"
            echo "- Version ID: \`${{ steps.deploy.outputs.version_id }}\`"
            echo "- URL: https://appbeta.wearerighello.com"
            echo "- Workers.dev: https://optima-beta-production.axel-15d.workers.dev"
            echo ""
            echo "Verificato tramite wrangler deploy con route patch automatico."
          } >> "$GITHUB_STEP_SUMMARY"